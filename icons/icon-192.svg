  <text x="96" y="156" font-size="29" text-anchor="middle" fill="#5D4037" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif" font-weight="900" stroke="#5D4037" stroke-width="0.5">해빛스쿨</text>
